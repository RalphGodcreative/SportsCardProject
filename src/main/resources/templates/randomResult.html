<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Random Result</title>

    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <script th:inline="javascript">
      $(document).ready(function(){

      var list = [[${randomList}]];
      console.log(list);
      $('#itemLength').text(list.length);

      });

    </script>
    
    <style>
      .butt {
        margin: auto;
      }
      #itemCount {
        margin: 20px;
        font-size: 20px;
        text-align: center;
        color: #94a3b8;
      }
      #result-list {
        background-color: #12121a;
        border: 1px solid rgba(49, 246, 181, 0.15);
        box-shadow: 0 0 20px rgba(49, 246, 181, 0.08);
        padding: 8px 0;
        min-width: 200px;
      }
      .result-item {
        padding: 8px 24px;
        color: #e2e8f0;
        font-size: 16px;
      }
      .result-item:nth-child(odd) {
        background-color: rgba(49, 246, 181, 0.04);
      }
      .result-item:hover {
        background-color: rgba(49, 246, 181, 0.09);
      }
      .random-count {
        color: #31F6B5;
        text-shadow: 0 0 10px rgba(49, 246, 181, 0.6);
        font-weight: bold;
      }
      .result-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 16px;
      }
    </style>
    <link rel="stylesheet" th:href="@{/assets/style.css}" />
  </head>
  <body>
    <div th:replace="~{banner.html :: header}"></div>
    <div class="page-top">
      <div>
        <h1>Result</h1>
        <div id="itemCount">you have <span id="itemLength"></span> items</div>

        <div id="result-list">
          <div class="result-item" th:each="value,status:${randomList}">
            [[${status.count}]] : [[${value}]]
          </div>
        </div>

        <div style="margin: 24px 0; text-align: center; font-size: 20px;">
          you have randomized <span class="random-count">[[${randomTimes}]]</span> times
        </div>

        <div class="result-actions">
          <form method="post" th:action="@{/randomize}">
            <textarea style="display: none" th:name="nameList">[[${nameList}]]</textarea>
            <input type="hidden" th:name="randomTimes" th:value="${randomTimes}" />
            <button type="submit" class="confirm-butt">Randomize again</button>
          </form>
          <button class="neon-butt" th:onclick="window.location.href=[[@{/random}]]">Return</button>
        </div>
      </div>
    </div>
  </body>
</html>
