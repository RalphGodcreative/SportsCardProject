<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RG Website</title>
    <style></style>
    <link rel="stylesheet" th:href="@{/assets/style.css}" />
  </head>
  <body>
    <div th:fragment="header" class="banner-header">
      <span>
        <a class="logo" href="/">
          <img th:src="@{/img/RGForBanner.png}" />
        </a>
      </span>

      <!-- Desktop nav (hidden on mobile via CSS) -->
      <ul id="nav-links">
        <li class="dropdown">
          <a class="banner-category" href="/random">
            Randomizer
          </a>
        </li>
        <li class="dropdown">
          <a class="banner-category" href="/card">
            cards
          </a>
          <div class="dropdown-content">
            <a href="/card/addTransaction">add Transaction</a>
            <a href="/card/cards">view Cards</a>
            <a href="/card/searchCard">search Cards</a>
            <a href="/transactions/">view Transactions</a>
          </div>
        </li>
        <li class="dropdown">
          <a class="banner-category" href="/crawler">
            yahoo crawler
          </a>
        </li>
      </ul>

      <!-- Desktop auth panel (hidden on mobile via CSS) -->
      <div class="auth-panel">
        <div sec:authorize="isAnonymous()">
          <a href="/login" class="auth-btn">Login</a>
        </div>
        <div class="user-dropdown" sec:authorize="isAuthenticated()">
          <button class="user-btn" id="user-toggle">
            <span th:text="${displayUsername}">User</span>
            <span>&#9660;</span>
          </button>
          <div class="user-menu" id="user-menu">
            <a href="/user/edit" class="user-menu-item">Edit Profile</a>
            <a href="/admin/recommendations" class="user-menu-item" sec:authorize="hasAuthority('ROLE_ADMIN')">Recommendations</a>
            <form th:action="@{/logout}" method="post">
              <button type="submit" class="user-menu-item">Logout</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Mobile nav (hidden on desktop via CSS) -->
      <div class="mobile-nav">
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
        <div class="mobile-menu" id="mobile-menu">
          <a href="/random">Randomizer</a>
          <a href="/card">Cards</a>
          <a href="/card/addTransaction" class="mobile-sub">add Transaction</a>
          <a href="/card/cards" class="mobile-sub">view Cards</a>
          <a href="/card/searchCard" class="mobile-sub">search Cards</a>
          <a href="/transactions/" class="mobile-sub">view Transactions</a>
          <a href="/crawler">Yahoo Crawler</a>
          <div sec:authorize="isAnonymous()">
            <a href="/login">Login</a>
          </div>
          <div sec:authorize="isAuthenticated()">
            <span class="mobile-username" th:text="${displayUsername}">User</span>
            <a href="/user/edit" class="mobile-sub">Edit Profile</a>
            <a href="/admin/recommendations" class="mobile-sub" sec:authorize="hasAuthority('ROLE_ADMIN')">Recommendations</a>
            <form th:action="@{/logout}" method="post" style="margin:0">
              <button type="submit" class="mobile-logout">Logout</button>
            </form>
          </div>
        </div>
      </div>

      <script>
        document.getElementById('nav-toggle').addEventListener('click', function (e) {
          e.stopPropagation();
          document.getElementById('mobile-menu').classList.toggle('open');
        });
        document.addEventListener('click', function () {
          document.getElementById('mobile-menu').classList.remove('open');
          var userMenu = document.getElementById('user-menu');
          if (userMenu) userMenu.classList.remove('open');
        });
        var userToggle = document.getElementById('user-toggle');
        if (userToggle) {
          userToggle.addEventListener('click', function (e) {
            e.stopPropagation();
            document.getElementById('user-menu').classList.toggle('open');
          });
        }
      </script>
    </div>
  </body>
</html>
