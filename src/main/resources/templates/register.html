<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Register</title>
  <link rel="stylesheet" th:href="@{/assets/style.css}" />
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #111; }
    .auth-box { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 2rem; width: 100%; max-width: 380px; }
    .auth-box h2 { color: #fff; margin-top: 0; margin-bottom: 1.5rem; text-align: center; }
    .auth-box label { display: block; color: #aaa; font-size: 0.85rem; margin-bottom: 0.3rem; }
    .auth-box input, .auth-box select { width: 100%; box-sizing: border-box; padding: 0.6rem 0.8rem; border: 1px solid #444; border-radius: 4px; background: #222; color: #fff; font-size: 1rem; margin-bottom: 1rem; }
    .auth-box button { width: 100%; padding: 0.7rem; background: #c8a84b; border: none; border-radius: 4px; color: #111; font-weight: bold; font-size: 1rem; cursor: pointer; }
    .auth-box button:hover { background: #e0bf6a; }
    .pwd-rules { background: #111; border: 1px solid #333; border-radius: 4px; padding: 0.6rem 0.8rem; margin: -0.5rem 0 1rem; display: flex; flex-direction: column; gap: 0.3rem; }
    .pwd-rule { font-size: 0.82rem; color: #666; transition: color 0.2s ease; }
    .pwd-rule.met { color: #4ade80; }
  </style>
</head>
<body>
  <div class="auth-box">
    <h2>Create Account</h2>
    <div th:if="${error}" style="color:#f87171; margin-bottom:1rem; font-size:0.9rem;" th:text="${error}"></div>
    <form th:action="@{/register}" method="post">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autofocus autocomplete="email" />

      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="new-password"
             minlength="8" pattern="^(?=.*[a-zA-Z])(?=.*[0-9]).{8,}$"
             title="At least 8 characters, including 1 letter and 1 number" />
      <div class="pwd-rules">
        <div class="pwd-rule" id="rule-length">&#10007; At least 8 characters</div>
        <div class="pwd-rule" id="rule-letter">&#10007; At least 1 letter</div>
        <div class="pwd-rule" id="rule-number">&#10007; At least 1 number</div>
      </div>

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" required autocomplete="new-password" />
      <p id="confirm-error" style="color:#f87171; font-size:0.78rem; margin:-0.7rem 0 1rem; display:none;">Passwords do not match.</p>

      <button type="submit">Create Account</button>
    </form>
  </div>
  <script>
    var form = document.querySelector('form');
    var password = document.getElementById('password');
    var confirm = document.getElementById('confirm');
    var confirmError = document.getElementById('confirm-error');
    var ruleLength = document.getElementById('rule-length');
    var ruleLetter = document.getElementById('rule-letter');
    var ruleNumber = document.getElementById('rule-number');

    function setRule(el, met, passText, failText) {
      el.textContent = (met ? '✓ ' : '✗ ') + (met ? passText : failText);
      el.classList.toggle('met', met);
    }

    password.addEventListener('input', function () {
      var val = password.value;
      setRule(ruleLength, val.length >= 8, 'At least 8 characters', 'At least 8 characters');
      setRule(ruleLetter, /[a-zA-Z]/.test(val), 'At least 1 letter', 'At least 1 letter');
      setRule(ruleNumber, /[0-9]/.test(val), 'At least 1 number', 'At least 1 number');
    });

    confirm.addEventListener('input', function () {
      if (confirm.value && confirm.value !== password.value) {
        confirmError.style.display = 'block';
        confirm.setCustomValidity('Passwords do not match.');
      } else {
        confirmError.style.display = 'none';
        confirm.setCustomValidity('');
      }
    });

    form.addEventListener('submit', function (e) {
      if (password.value !== confirm.value) {
        e.preventDefault();
        confirmError.style.display = 'block';
        confirm.setCustomValidity('Passwords do not match.');
      }
    });
  </script>
</body>
</html>
