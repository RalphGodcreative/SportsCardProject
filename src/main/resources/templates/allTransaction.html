<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>All Transactions</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script
      type="text/javascript"
      src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"
    ></script>
    <script></script>

    <style>
      #contain-table table,
      tr,
      td,
      th {
        border-collapse: collapse;
        border: 1px solid rgba(202, 71, 245, 0.2);
        color: #e2e8f0;
      }
      #contain-table {
        background-color: #12121a;
        box-shadow: 0 0 20px rgba(202, 71, 245, 0.05);
      }
      #contain-table th {
        background: linear-gradient(45deg, rgba(124, 58, 237, 0.5), rgba(202, 71, 245, 0.3));
        text-shadow: 0 0 8px rgba(202, 71, 245, 0.4);
      }
      #contain-table td{
        padding-left: 5px;
        padding-right: 5px;
      }

      .transaction-row{
        cursor: pointer;
      }
      .transaction-row:hover{
        background-color: rgba(202, 71, 245, 0.08);
      }

    </style>
    <link rel="stylesheet" th:href="@{/assets/style.css}" />
  </head>
  <body>
    <div th:replace="~{banner.html :: header}"></div>
    <div class="page-top">
      <div class="center-div" id="contain-table">
        <div class="table-center">
        <table>
          <tr>
            <th>id</th>
            <th>date</th>
            <th>type</th>
            <th>amount</th>
          </tr>
          <tr th:each="tran : ${transactions}" class="transaction-row" th:onclick="'location.href=\'/transactions/' + ${tran.id} + '\''">
            <td>[[${tran.id}]]</td>
            <td>[[${tran.date}]]</td>
            <td>[[${tran.type}]]</td>
            <td>[[${tran.amount}]]</td>
          </tr>
        </table>
        </div>
      </div>
    </div>
  </body>
</html>
