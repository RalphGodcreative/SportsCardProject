<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <link rel="stylesheet" th:href="@{/assets/style.css}" />
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #111; }
    .auth-box { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 2rem; width: 100%; max-width: 380px; }
    .auth-box h2 { color: #fff; margin-top: 0; margin-bottom: 1.5rem; text-align: center; }
    .auth-box label { display: block; color: #aaa; font-size: 0.85rem; margin-bottom: 0.3rem; }
    .auth-box input { width: 100%; box-sizing: border-box; padding: 0.6rem 0.8rem; border: 1px solid #444; border-radius: 4px; background: #222; color: #fff; font-size: 1rem; margin-bottom: 1rem; }
    .auth-box button { width: 100%; padding: 0.7rem; background: #c8a84b; border: none; border-radius: 4px; color: #111; font-weight: bold; font-size: 1rem; cursor: pointer; }
    .auth-box button:hover { background: #e0bf6a; }
    .msg { text-align: center; font-size: 0.85rem; margin-top: 1rem; }
    .msg.error { color: #e55; }
    .msg.success { color: #5c5; }
  </style>
</head>
<body>
  <div class="auth-box">
    <h2>RG Cards</h2>
    <form th:action="@{/login}" method="post">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autofocus />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required />

      <button type="submit">Sign In</button>
    </form>

    <p class="msg error" th:if="${param.error}">Invalid email or password.</p>
    <p class="msg success" th:if="${param.logout}">You have been signed out.</p>
    <p class="msg success" th:if="${param.registered}">Account created — you can now sign in.</p>
  </div>
</body>
</html>
