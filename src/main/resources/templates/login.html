<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" th:href="@{/assets/style.css}" />
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #111; }
    .auth-box { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 2rem; width: 100%; max-width: 380px; }
    .auth-box h2 { color: #fff; margin-top: 0; margin-bottom: 1.5rem; text-align: center; }
    .auth-box label { display: block; color: #aaa; font-size: 0.85rem; margin-bottom: 0.3rem; }
    .auth-box input { width: 100%; box-sizing: border-box; padding: 0.6rem 0.8rem; border: 1px solid #444; border-radius: 4px; background: #222; color: #fff; font-size: 1rem; margin-bottom: 1rem; }
    .auth-box button { width: 100%; padding: 0.7rem; background: #c8a84b; border: none; border-radius: 4px; color: #111; font-weight: bold; font-size: 1rem; cursor: pointer; }
    .auth-box button:hover { background: #e0bf6a; }
    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1rem 0; color: #555; font-size: 0.82rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #333; }
    .btn-google { display: flex; align-items: center; justify-content: center; gap: 0.6rem; width: 100%; padding: 0.7rem; background: #fff; border: 1px solid #ddd; border-radius: 4px; color: #333; font-size: 0.95rem; font-weight: 500; text-decoration: none; cursor: pointer; transition: background 0.2s ease; }
    .btn-google:hover { background: #f5f5f5; }
    .msg { text-align: center; font-size: 0.85rem; margin-top: 1rem; }
    .msg.error { color: #e55; }
    .msg.success { color: #5c5; }
  </style>
</head>
<body>
  <div class="auth-box">
    <h2>RG SportsCards</h2>
    <form th:action="@{/login}" method="post">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autofocus />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required />

      <button type="submit">Sign In</button>
    </form>

    <div class="divider">or</div>
    <a href="/oauth2/authorization/google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.11 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </a>

    <p class="msg error" th:if="${param.error}">Invalid email or password.</p>
    <p class="msg success" th:if="${param.logout}">You have been signed out.</p>
    <p class="msg success" th:if="${param.registered}">Account created — you can now sign in.</p>
    <p class="msg" th:if="${registrationEnabled}" style="color:#aaa;">
      Don't have an account? <a href="/register" style="color:#c8a84b; text-decoration:none;">Register</a>
    </p>
  </div>
</body>
</html>
